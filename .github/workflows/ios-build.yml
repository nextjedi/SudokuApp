name: iOS Build & Deploy

on:
  # iOS builds disabled for now - will enable when iOS setup is complete
  # To enable: uncomment the 'push' section below

  workflow_dispatch:
    inputs:
      lane:
        description: 'Fastlane lane to run'
        required: true
        type: choice
        options:
          - build_alpha
          - build_beta
          - build_production
          - deploy_alpha
          - deploy_beta
          - deploy_production

  # Temporarily disabled - uncomment when ready for iOS
  # push:
  #   branches:
  #     - 'release/alpha'
  #     - 'release/beta'
  #   tags:
  #     - 'v*'
  #   paths:
  #     - 'src/**'
  #     - 'SudokuKMP/iosApp/**'
  #     - 'app.json'
  #     - 'package.json'
  #     - 'package-lock.json'
  #     - '.github/workflows/ios-build.yml'
  #   paths-ignore:
  #     - 'web/**'
  #     - 'web-build/**'
  #     - 'docs/**'
  #     - '*.md'
  #     - '.gitignore'
  #     - 'articles/**'

jobs:
  build:
    name: iOS Build
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install CocoaPods dependencies
        run: |
          cd SudokuKMP/iosApp
          pod install

      - name: Install signing certificate
        run: |
          echo "${{ secrets.IOS_DISTRIBUTION_CERT_P12 }}" | base64 -d > /tmp/distribution.p12
          security create-keychain -p "${{ secrets.IOS_CERT_KEYCHAIN_PASSWORD }}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${{ secrets.IOS_CERT_KEYCHAIN_PASSWORD }}" build.keychain
          security import /tmp/distribution.p12 \
            -k build.keychain \
            -P "${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: -s \
            -k "${{ secrets.IOS_CERT_KEYCHAIN_PASSWORD }}" build.keychain
          rm /tmp/distribution.p12

      - name: Install provisioning profile
        run: |
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          echo "${{ secrets.IOS_PROVISIONING_PROFILE }}" | base64 -d > "$PROFILES_DIR/sudoku-appstore.mobileprovision"

      - name: Install Fastlane
        run: |
          cd SudokuKMP/iosApp
          gem install fastlane -N
          bundle init
          bundle add fastlane

      - name: Determine Fastlane lane
        id: lane
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "lane=${{ github.event.inputs.lane }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/release/alpha" ]]; then
            echo "lane=deploy_alpha" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/release/beta" ]]; then
            echo "lane=deploy_beta" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "lane=deploy_production" >> $GITHUB_OUTPUT
          else
            echo "lane=build_alpha" >> $GITHUB_OUTPUT
          fi

      - name: Run Fastlane
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
        run: |
          cd SudokuKMP/iosApp
          bundle exec fastlane ${{ steps.lane.outputs.lane }}

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-ipa
          path: SudokuKMP/iosApp/build/*.ipa
          retention-days: 30

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain build.keychain
